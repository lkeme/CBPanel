name: Release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  windows:
    name: Windows installer and portable
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 25
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        run: npm ci

      - name: Build Windows release
        run: npm run release:windows

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: cbpanel-windows
          path: |
            release/CBPanel-win-portable.zip
            release/app-update-manifest.json
            src-tauri/target/release/bundle/nsis/*.exe
          if-no-files-found: error

  linux:
    name: Linux AppImage
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 25
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Tauri Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            curl \
            file \
            libayatana-appindicator3-dev \
            libgtk-3-dev \
            librsvg2-dev \
            libssl-dev \
            libwebkit2gtk-4.1-dev \
            libxdo-dev \
            patchelf \
            wget

      - name: Install dependencies
        run: npm ci

      - name: Build Linux release
        run: npm run release:linux

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v4
        with:
          name: cbpanel-linux-x64
          path: |
            release/CBPanel-linux-x64.AppImage
            release/app-update-manifest.json
          if-no-files-found: error
