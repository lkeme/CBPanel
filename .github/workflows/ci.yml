name: CI

on:
  push:
    branches:
      - master
  pull_request:

jobs:
  check:
    name: Typecheck, Test, Build
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 25
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: Build frontend
        run: npm run build

      - name: Bundle baseline
        run: npm run bundle:baseline
