name: Dev Build

on:
  workflow_dispatch:
    inputs:
      windows_mode:
        description: Windows dev build mode
        required: true
        default: portable
        type: choice
        options:
          - portable
          - full
          - skip
      include_linux:
        description: Include Linux AppImage dev build
        required: true
        default: false
        type: boolean
      include_macos:
        description: Include macOS dev build
        required: true
        default: true
        type: boolean
  push:
    branches:
      - master
    paths-ignore:
      - "**/*.md"
      - "**/*.mdx"
      - "README*"
      - "CHANGELOG*"
      - "LICENSE"
      - "NOTICE*"
      - "docs/**"
      - ".github/ISSUE_TEMPLATE/**"
      - ".github/PULL_REQUEST_TEMPLATE*"
      - ".agents/**"
      - ".codex/**"
      - ".trellis/**"

concurrency:
  group: dev-build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Keep push builds lean during development. Broader targets stay available
  # through workflow_dispatch inputs for temporary manual use.
  windows-portable:
    if: github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && inputs.windows_mode == 'portable')
    name: Windows dev portable
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 25
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        run: npm ci

      - name: Build Windows portable artifact
        run: npm run desktop:portable

      - name: Upload Windows portable dev artifact
        uses: actions/upload-artifact@v6
        with:
          name: cbpanel-dev-windows-portable-${{ github.sha }}
          path: |
            release/CBPanel-win-portable.zip
          if-no-files-found: error
          retention-days: 14

  windows-full:
    if: github.event_name == 'workflow_dispatch' && inputs.windows_mode == 'full'
    name: Windows dev installer and portable
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 25
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        run: npm ci

      - name: Build Windows dev release
        run: npm run release:windows

      - name: Upload Windows full dev artifacts
        uses: actions/upload-artifact@v6
        with:
          name: cbpanel-dev-windows-full-${{ github.sha }}
          path: |
            release/CBPanel-win-portable.zip
            release/app-update-manifest.json
            src-tauri/target/release/bundle/nsis/*.exe
          if-no-files-found: error
          retention-days: 14

  linux:
    if: github.event_name == 'workflow_dispatch' && inputs.include_linux
    name: Linux dev AppImage
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 25
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Tauri Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            curl \
            file \
            libayatana-appindicator3-dev \
            libgtk-3-dev \
            librsvg2-dev \
            libssl-dev \
            libwebkit2gtk-4.1-dev \
            libxdo-dev \
            patchelf \
            wget

      - name: Install dependencies
        run: npm ci

      - name: Build Linux dev release
        run: npm run release:linux

      - name: Upload Linux dev artifacts
        uses: actions/upload-artifact@v6
        with:
          name: cbpanel-dev-linux-x64-${{ github.sha }}
          path: |
            release/CBPanel-linux-x64.AppImage
            release/app-update-manifest.json
          if-no-files-found: error
          retention-days: 14

  macos:
    if: github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && inputs.include_macos)
    name: macOS dev DMG
    runs-on: macos-15
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 25
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        run: npm ci

      - name: Build macOS dev release
        run: npm run release:mac

      - name: Upload macOS dev artifacts
        uses: actions/upload-artifact@v6
        with:
          name: cbpanel-dev-macos-${{ github.sha }}
          path: |
            release/CBPanel-macos-*.dmg
            release/app-update-manifest.json
          if-no-files-found: error
          retention-days: 14
