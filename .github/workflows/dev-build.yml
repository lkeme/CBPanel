name: Dev Build

on:
  workflow_dispatch:
  push:
    branches:
      - master
    paths-ignore:
      - "**/*.md"
      - "**/*.mdx"
      - "README*"
      - "CHANGELOG*"
      - "LICENSE"
      - "NOTICE*"
      - "docs/**"
      - ".github/ISSUE_TEMPLATE/**"
      - ".github/PULL_REQUEST_TEMPLATE*"
      - ".agents/**"
      - ".codex/**"
      - ".trellis/**"

concurrency:
  group: dev-build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  windows:
    name: Windows dev installer and portable
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 25
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        run: npm ci

      - name: Build Windows dev release
        run: npm run release:windows

      - name: Upload Windows dev artifacts
        uses: actions/upload-artifact@v4
        with:
          name: cbpanel-dev-windows-${{ github.sha }}
          path: |
            release/CBPanel-win-portable.zip
            release/app-update-manifest.json
            src-tauri/target/release/bundle/nsis/*.exe
          if-no-files-found: error
          retention-days: 14

  linux:
    name: Linux dev AppImage
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 25
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Tauri Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            curl \
            file \
            libayatana-appindicator3-dev \
            libgtk-3-dev \
            librsvg2-dev \
            libssl-dev \
            libwebkit2gtk-4.1-dev \
            libxdo-dev \
            patchelf \
            wget

      - name: Install dependencies
        run: npm ci

      - name: Build Linux dev release
        run: npm run release:linux

      - name: Upload Linux dev artifacts
        uses: actions/upload-artifact@v4
        with:
          name: cbpanel-dev-linux-x64-${{ github.sha }}
          path: |
            release/CBPanel-linux-x64.AppImage
            release/app-update-manifest.json
          if-no-files-found: error
          retention-days: 14

  macos:
    name: macOS dev DMG
    runs-on: macos-15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 25
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        run: npm ci

      - name: Build macOS dev release
        run: npm run release:mac

      - name: Upload macOS dev artifacts
        uses: actions/upload-artifact@v4
        with:
          name: cbpanel-dev-macos-${{ github.sha }}
          path: |
            release/CBPanel-macos-*.dmg
            release/app-update-manifest.json
          if-no-files-found: error
          retention-days: 14
